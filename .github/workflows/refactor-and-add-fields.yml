name: Refactor app and add fields

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/refactor-and-add-fields.py
      - .github/workflows/refactor-and-add-fields.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Split assets and add fields
        run: python3 scripts/refactor-and-add-fields.py

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md assets/app.css assets/app.js
          if git diff --cached --quiet; then
            echo "No refactor changes to commit."
          else
            git commit -m "Split app assets and add chat validation fields"
            git push
          fi
